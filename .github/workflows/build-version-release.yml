name: version-documentation
on:
 release:
   types: [published]

permissions: 
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      
      - name: Setup python
        uses: actions/setup-python@v6
        with:
          python-version: 3.x
      
      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          key: ${{ github.ref }}
          path: .cache

      - name: Install dependencies
        run: |
          pip install mkdocs-material==9.7.6 mkdocs-material-extensions==1.3.1 mkdocs-git-revision-date-localized-plugin==1.5.1 mike==2.1.4 mkdocs-glightbox==0.5.2 mkdocs-macros-plugin==1.5.0 pandas==3.0.1 click==8.2.1
      
      - name: Build documentation
        run: |
          git config user.name sage-wright
          git config user.email sage.wright@theiagen.com 
          LATEST_RELEASE=$(curl -sL https://api.github.com/repos/theiagen/public_health_bioinformatics/releases/latest | jq -r ".tag_name")
          mike deploy --push --update-aliases ${LATEST_RELEASE} latest
          mike set-default --push latest